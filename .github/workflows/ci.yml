name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @friends/database db:generate
      - run: yarn workspace @friends/database build
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: yarn lint
      - run: yarn format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: yarn build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: npx playwright install chromium --with-deps
      - run: yarn workspace @friends/ui test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: packages/ui/coverage/
          retention-days: 14

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: packages/ui/coverage/
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  chromatic:
    name: Visual Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: yarn workspace @friends/ui chromatic
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
