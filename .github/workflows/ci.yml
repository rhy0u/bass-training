name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @bass-training/database db:generate
      - run: yarn workspace @bass-training/database build
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: yarn lint
      - run: yarn format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: yarn build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: npx playwright install chromium --with-deps
      - run: yarn workspace @bass-training/ui test:coverage
      - run: yarn workspace @bass-training/web test:coverage
      - run: yarn workspace @bass-training/database test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ui
          path: packages/ui/coverage/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-web
          path: apps/web/coverage/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-database
          path: packages/database/coverage/
          retention-days: 14

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage-ui
          path: packages/ui/coverage/
      - uses: actions/download-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage/
      - uses: actions/download-artifact@v4
        with:
          name: coverage-database
          path: packages/database/coverage/
      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  chromatic:
    name: Visual Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: yarn workspace @bass-training/ui chromatic
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, build, test, sonar, chromatic]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
            packages/database/dist
            packages/database/node_modules/.prisma
          key: deps-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}
      - run: echo "Deploying…"
      # TODO: replace the echo above with your actual deployment commands
